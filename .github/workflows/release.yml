name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build, e.g. v1.0.2.0'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build Release & Publish
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      checksum: ${{ steps.checksum.outputs.md5 }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Determine tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Parse version
        id: version
        run: |
          VERSION=$(grep -oPm1 '<Version>\K[^<]+' Jellyfin.Plugin.AnimeFillerSkipper/Jellyfin.Plugin.AnimeFillerSkipper.csproj)
          EXPECTED_TAG="v${VERSION}"
          if [ "${{ steps.meta.outputs.tag }}" != "$EXPECTED_TAG" ]; then
            echo "Tag ${{ steps.meta.outputs.tag }} does not match project version $VERSION (expected $EXPECTED_TAG)" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release

      - name: Publish
        run: dotnet publish Jellyfin.Plugin.AnimeFillerSkipper/Jellyfin.Plugin.AnimeFillerSkipper.csproj --no-build --configuration Release -o publish

      - name: Create release zip
        run: |
          mkdir -p release
          cd publish
          zip -r ../release/jellyfin-anime-filler-skipper_${{ steps.version.outputs.version }}.zip \
            Jellyfin.Plugin.AnimeFillerSkipper.dll HtmlAgilityPack.dll

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(md5sum release/jellyfin-anime-filler-skipper_${{ steps.version.outputs.version }}.zip | cut -d' ' -f1)
          echo "md5=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.tag }}
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          overwrite_files: true
          files: release/jellyfin-anime-filler-skipper_${{ steps.version.outputs.version }}.zip

  update-manifest:
    name: Update manifest.json
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: needs.build-and-publish.result == 'success'

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Determine tag and version
        id: meta
        run: |
          echo "tag=${{ needs.build-and-publish.outputs.tag }}" >> "$GITHUB_OUTPUT"
          echo "version=${{ needs.build-and-publish.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Download release asset
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          VERSION="${{ steps.meta.outputs.version }}"
          ZIP="jellyfin-anime-filler-skipper_${VERSION}.zip"

          for i in $(seq 1 5); do
            echo "Attempt $i: downloading $ZIP from $TAG"
            if curl -sSfL -o "$ZIP" \
              "https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP}"; then
              echo "Download succeeded"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "ERROR: Could not download $ZIP after 5 attempts" >&2
          exit 1

      - name: Compute checksum
        id: checksum
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          ZIP="jellyfin-anime-filler-skipper_${VERSION}.zip"
          CHECKSUM=$(md5sum "$ZIP" | cut -d' ' -f1)
          echo "md5=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Update manifest.json
        run: |
          export VERSION="${{ steps.meta.outputs.version }}"
          export TAG="${{ steps.meta.outputs.tag }}"
          export CHECKSUM="${{ steps.checksum.outputs.md5 }}"
          export TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          export REPO="${{ github.repository }}"
          export DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/jellyfin-anime-filler-skipper_${VERSION}.zip"

          python3 << PYEOF
          import json, os

          with open("manifest.json") as f:
              manifest = json.load(f)

          entry = {
              "version": os.environ["VERSION"],
              "changelog": f"See https://github.com/{os.environ['REPO']}/releases/tag/{os.environ['TAG']}",
              "targetAbi": "10.11.0.0",
              "sourceUrl": os.environ["DOWNLOAD_URL"],
              "checksum": os.environ["CHECKSUM"],
              "timestamp": os.environ["TIMESTAMP"]
          }

          versions = manifest[0]["versions"]
          for index, current in enumerate(versions):
              if current["version"] == os.environ["VERSION"]:
                  versions[index] = entry
                  break
          else:
              versions.insert(0, entry)

          versions.sort(key=lambda item: [int(part) for part in item["version"].split(".")], reverse=True)

          with open("manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          print(f"Upserted version {os.environ['VERSION']} in manifest.json")
          PYEOF

      - name: Commit and push manifest
        run: |
          cp manifest.json docs/manifest.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json docs/manifest.json
          git commit -m "chore: update manifest for ${{ steps.meta.outputs.tag }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main
