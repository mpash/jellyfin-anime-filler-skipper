name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build Release & Publish
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      checksum: ${{ steps.checksum.outputs.md5 }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Parse version
        id: version
        run: |
          VERSION=$(grep -oPm1 '<Version>\K[^<]+' Jellyfin.Plugin.AnimeFillerSkipper/Jellyfin.Plugin.AnimeFillerSkipper.csproj)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release

      - name: Publish
        run: dotnet publish Jellyfin.Plugin.AnimeFillerSkipper/Jellyfin.Plugin.AnimeFillerSkipper.csproj --no-build --configuration Release -o publish

      - name: Create release zip
        run: |
          mkdir -p release
          cd publish
          zip -r ../release/jellyfin-anime-filler-skipper_${{ steps.version.outputs.version }}.zip \
            Jellyfin.Plugin.AnimeFillerSkipper.dll HtmlAgilityPack.dll

      - name: Compute checksum
        id: checksum
        run: |
          CHECKSUM=$(md5sum release/jellyfin-anime-filler-skipper_${{ steps.version.outputs.version }}.zip | cut -d' ' -f1)
          echo "md5=$CHECKSUM" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/jellyfin-anime-filler-skipper_${{ steps.version.outputs.version }}.zip

  update-manifest:
    name: Update manifest.json
    runs-on: ubuntu-latest
    needs: release

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Update manifest.json
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          CHECKSUM="${{ needs.release.outputs.checksum }}"
          TAG="${{ github.ref_name }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="${{ github.repository }}"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/${TAG}/jellyfin-anime-filler-skipper_${VERSION}.zip"

          VERSION_CHECK=$(python3 -c "import json; m=json.load(open('manifest.json')); print(any(v['version']=='$VERSION' for v in m[0]['versions']))")
          if [ "$VERSION_CHECK" = "True" ]; then
            echo "Version $VERSION already in manifest, skipping update"
            exit 0
          fi

          python3 << PYEOF
          import json, os

          with open("manifest.json") as f:
              manifest = json.load(f)

          entry = {
              "version": os.environ["VERSION"],
              "changelog": f"See https://github.com/{os.environ['REPO']}/releases/tag/{os.environ['TAG']}",
              "targetAbi": "10.11.0.0",
              "sourceUrl": os.environ["DOWNLOAD_URL"],
              "checksum": os.environ["CHECKSUM"],
              "timestamp": os.environ["TIMESTAMP"]
          }

          existing = [v for v in manifest[0]["versions"] if v["version"] == os.environ["VERSION"]]
          if existing:
              print(f"Version {os.environ['VERSION']} already exists, skipping")
          else:
              manifest[0]["versions"].insert(0, entry)
              with open("manifest.json", "w") as f:
                  json.dump(manifest, f, indent=2)
                  f.write("\n")
              print(f"Added version {os.environ['VERSION']} to manifest.json")
          PYEOF

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "chore: update manifest for ${{ github.ref_name }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main
